<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DriverLink</title>

<style>
  :root {
    --bg: #ECE5DD; /* WhatsApp light wallpaper tone */
    --panel: #FFFFFF;
    --panel-light: #F7F7F7;
    --accent: #25D366;
    --accent-dark: #128C7E;
    --text: #111;
    --text-dim: #555;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, Arial;
    overflow-x: hidden;
    box-sizing: border-box;
  }

  * {
    box-sizing: inherit;
  }

  .hidden { display: none; }

  /* HEADER */
  .header {
    background: var(--accent-dark);
    padding: 14px;
    font-size: 18px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: space-between;
    white-space: nowrap;
    overflow: hidden;
    color: white;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 30;
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--accent);
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 10px;
    font-weight: bold;
  }

  #status {
    flex-shrink: 1;
    max-width: 80px;
    text-overflow: ellipsis;
    overflow: hidden;
    font-size: 14px;
  }

  .statusDot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }

  .online { background: var(--accent); }
  .offline { background: #ff4d4d; }

  /* LOGIN */
  #login {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 30px;
    z-index: 9999;
    text-align: center;
  }

  #login input {
    padding: 14px;
    margin-top: 12px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    width: 100%;
  }

  #login button {
    margin-top: 12px;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--accent-dark);
    color: white;
    font-size: 16px;
    width: 100%;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--panel);
    position: fixed;
    top: 58px;
    width: 100%;
    z-index: 25;
  }

  .tab {
    flex: 1;
    text-align: center;
    padding: 12px;
    cursor: pointer;
    color: var(--text-dim);
    font-weight: 500;
  }

  .activeTab {
    color: var(--accent-dark);
    border-bottom: 2px solid var(--accent-dark);
  }

  /* PANELS */
  #chat, #jobsTab, #driversTab {
    position: absolute;
    top: 110px;
    bottom: 60px;
    left: 0;
    right: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px;

    /* Wallpaper hook */
    background: url('wallpaper.png');
    background-size: 280px;
    background-repeat: repeat;
  }

  /* CHAT */
  #messages {
    padding-bottom: 8px;
  }

  .bubble {
    max-width: 80%;
    padding: 8px 12px;
    border-radius: 14px;
    margin-bottom: 8px;
    line-height: 1.4;
    font-size: 15px;
    position: relative;
    display: inline-block;
  }

  .bubble.me {
    background: var(--accent);
    color: #000;
    margin-left: auto;
    border-bottom-right-radius: 4px;
    display: block;
  }

  .bubble.them {
    background: var(--panel);
    border-bottom-left-radius: 4px;
    display: block;
  }

  .bubble .name {
    font-weight: bold;
    color: var(--accent-dark);
    margin-bottom: 2px;
    font-size: 13px;
  }

  .bubble .meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    text-align: right;
  }

  .bubble .meta span {
    margin-left: 4px;
  }

  .typingIndicator {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    font-style: italic;
  }

  /* INPUT BAR */
  .inputBar {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: var(--panel);
    padding: 10px;
    display: flex;
    align-items: center;
    z-index: 30;
  }

  .attachBtn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--panel-light);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 8px;
    font-size: 20px;
    cursor: pointer;
  }

  .inputBar input {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    border: none;
    font-size: 15px;
  }

  .inputBar button {
    margin-left: 10px;
    background: var(--accent-dark);
    border: none;
    padding: 10px 16px;
    border-radius: 20px;
    color: white;
    font-weight: bold;
  }

  /* JOBS */
  .jobCard {
    background: var(--panel);
    margin: 10px 0;
    padding: 14px;
    border-radius: 14px;
    border-left: 4px solid var(--accent-dark);
    transition: 0.15s ease;
  }

  .jobCard:active {
    transform: scale(0.97);
  }

  .jobRoute {
    font-size: 17px;
    font-weight: bold;
  }

  .jobMeta {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 4px;
  }

  .jobStatus {
    margin-top: 6px;
    font-size: 13px;
  }

  .jobHint {
    margin-top: 8px;
    font-size: 11px;
    opacity: 0.5;
  }

  .jobActions {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .jobBtn {
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }

  .jobBtn.primary {
    background: var(--accent);
    color: #000;
  }

  .jobBtn.secondary {
    background: var(--panel-light);
    color: var(--text);
  }

  .postJobBtn {
    margin: 10px 0;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--accent-dark);
    color: white;
    font-weight: bold;
    width: 100%;
  }

  /* DRIVERS */
  .driverCard {
    background: var(--panel);
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    cursor: pointer;
  }

  .driverAvatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--accent);
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 10px;
    font-weight: bold;
    font-size: 14px;
  }

  .driverInfo {
    flex: 1;
  }

  .driverName {
    font-size: 15px;
    font-weight: 500;
  }

  .driverStatus {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* PROFILE MODAL */
  #profileModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .profileCard {
    background: var(--panel);
    padding: 20px;
    border-radius: 14px;
    width: 80%;
    max-width: 320px;
    text-align: center;
  }

  .profileAvatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--accent);
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 10px;
    font-size: 26px;
    font-weight: bold;
  }

  .profileName {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .profileMeta {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .profileClose {
    margin-top: 10px;
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    background: var(--accent-dark);
    color: white;
    font-weight: 500;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h2 style="color:#128C7E;">DriverLink</h2>
  <p style="opacity:0.7;">Enter your name to continue</p>
  <input id="name" placeholder="Your name">
  <button onclick="login()">Enter Network</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="header">
    <div style="display:flex;align-items:center;">
      <span id="avatar" class="avatar"></span>
      DriverLink
    </div>
    <span id="status"></span>
  </div>

  <div class="tabs">
    <div class="tab activeTab" onclick="showTab('chat', this)">Chat</div>
    <div class="tab" onclick="showTab('jobs', this)">Jobs</div>
    <div class="tab" onclick="showTab('drivers', this)">Drivers</div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div id="messages"></div>
    <div id="typing" class="typingIndicator hidden"></div>
  </div>

  <!-- JOBS -->
  <div id="jobsTab" class="hidden">
    <button class="postJobBtn" onclick="postJob()">+ Post Job</button>
    <div id="jobs"></div>
  </div>

  <!-- DRIVERS -->
  <div id="driversTab" class="hidden">
    <div id="drivers"></div>
  </div>

  <!-- INPUT BAR -->
  <div class="inputBar">
    <div class="attachBtn" onclick="attachPhoto()">📎</div>
    <input id="msgInput" placeholder="Message drivers..." oninput="onTyping()">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- PROFILE MODAL -->
<div id="profileModal">
  <div class="profileCard">
    <div class="profileAvatar" id="profileAvatar"></div>
    <div class="profileName" id="profileName"></div>
    <div class="profileMeta" id="profileMeta"></div>
    <button class="profileClose" onclick="closeProfile()">Close</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  updateDoc,
  doc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth,
  signInAnonymously
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhvNqHgKH5auAOCPUm4wZITa_3N5Ctnvc",
  authDomain: "driverlink-app.firebaseapp.com",
  projectId: "driverlink-app",
  storageBucket: "driverlink-app.firebasestorage.app",
  messagingSenderId: "360444468582",
  appId: "1:360444468582:web:0af78a95d0dfe104e9fca7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

await signInAnonymously(auth);

let username = "";
let lastSender = null;
let typingTimeout = null;
let isOnline = true;
let myPresenceDocId = null;

// LOGIN
window.login = async function () {
  const input = document.getElementById("name");
  username = input.value.trim();

  if (!username) {
    alert("Enter a name");
    return;
  }

  document.getElementById("avatar").innerText =
    username.charAt(0).toUpperCase();

  document.getElementById("login").style.display = "none";
  document.getElementById("app").classList.remove("hidden");

  await initPresence();
  loadMessages();
  loadJobs();
  loadDrivers();
  updateStatusUI();
};

// PRESENCE
async function initPresence() {
  const presRef = await addDoc(collection(db, "presence"), {
    name: username,
    online: true,
    typing: false,
    lastSeen: serverTimestamp()
  });
  myPresenceDocId = presRef.id;

  window.addEventListener("beforeunload", async () => {
    try {
      await updateDoc(doc(db, "presence", myPresenceDocId), {
        online: false,
        typing: false,
        lastSeen: serverTimestamp()
      });
    } catch (e) {}
  });
}

// SEND MESSAGE
window.sendMessage = async function () {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if (!text) return;

  await addDoc(collection(db, "messages"), {
    name: username,
    text,
    time: serverTimestamp(),
    delivered: true,
    seen: false
  });

  input.value = "";
  setTyping(false);
};

// TYPING
window.onTyping = function () {
  setTyping(true);
  if (typingTimeout) clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => setTyping(false), 2000);
};

async function setTyping(isTyping) {
  if (!myPresenceDocId) return;
  try {
    await updateDoc(doc(db, "presence", myPresenceDocId), {
      typing: isTyping,
      lastSeen: serverTimestamp()
    });
  } catch (e) {}
}

// LOAD MESSAGES
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("time"));

  onSnapshot(q, async (snapshot) => {
    const container = document.getElementById("messages");
    container.innerHTML = "";
    lastSender = null;

    const docs = [];
    snapshot.forEach(d => docs.push(d));

    // Mark all as seen (group-style)
    for (const d of docs) {
      const m = d.data();
      if (!m.seen) {
        try {
          await updateDoc(doc(db, "messages", d.id), { seen: true });
        } catch (e) {}
      }
    }

    docs.forEach((docSnap) => {
      const m = docSnap.data();
      const isMe = m.name === username;

      const bubble = document.createElement("div");
      bubble.className = "bubble " + (isMe ? "me" : "them");

      if (!isMe && lastSender !== m.name) {
        const name = document.createElement("div");
        name.className = "name";
        name.innerText = m.name;
        name.onclick = () => openProfile(m.name);
        bubble.appendChild(name);
      }

      const textNode = document.createElement("div");
      textNode.innerText = m.text;
      bubble.appendChild(textNode);

      const meta = document.createElement("div");
      meta.className = "meta";

      const timeStr = m.time?.toDate
        ? m.time.toDate().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
        : "";

      const timeSpan = document.createElement("span");
      timeSpan.innerText = timeStr;
      meta.appendChild(timeSpan);

      if (isMe) {
        const statusSpan = document.createElement("span");
        if (m.seen) {
          statusSpan.innerText = "✓✓";
        } else if (m.delivered) {
          statusSpan.innerText = "✓";
        }
        meta.appendChild(statusSpan);
      }

      bubble.appendChild(meta);
      container.appendChild(bubble);

      lastSender = m.name;
    });

    container.scrollTop = container.scrollHeight;
  });
}

// JOBS
window.postJob = async function () {
  let from = prompt("Pickup location:");
  if (!from) return;

  let to = prompt("Dropoff location:");
  if (!to) return;

  let time = prompt("Time:");
  if (!time) return;

  await addDoc(collection(db, "jobs"), {
    from,
    to,
    time,
    postedBy: username,
    takenBy: null,
    status: "available" // available, claimed, on_route, completed
  });
};

window.claimJob = async function (id) {
  const confirmTake = confirm("Claim this job?");
  if (!confirmTake) return;

  await updateDoc(doc(db, "jobs", id), {
    takenBy: username,
    status: "claimed"
  });
};

window.markOnRoute = async function (id) {
  await updateDoc(doc(db, "jobs", id), {
    status: "on_route"
  });
};

window.markCompleted = async function (id) {
  await updateDoc(doc(db, "jobs", id), {
    status: "completed"
  });
};

function statusLabel(j) {
  if (j.status === "completed") return "✅ Completed";
  if (j.status === "on_route") return "🟡 On route";
  if (j.status === "claimed") return `🔴 Claimed by ${j.takenBy}`;
  return "🟢 Available";
}

function loadJobs() {
  onSnapshot(collection(db, "jobs"), (snapshot) => {
    let html = "";

    snapshot.forEach((docSnap) => {
      let j = docSnap.data();

      html += `
        <div class="jobCard">
          <div class="jobRoute">🚗 ${j.from} → ${j.to}</div>
          <div class="jobMeta">🕒 ${j.time}</div>
          <div class="jobStatus">${statusLabel(j)}</div>
          <div class="jobHint">Posted by ${j.postedBy}</div>
          <div class="jobActions">
            ${j.status === "available" ? `<button class="jobBtn primary" onclick="claimJob('${docSnap.id}')">Claim</button>` : ""}
            ${j.status === "claimed" && j.takenBy === username ? `<button class="jobBtn secondary" onclick="markOnRoute('${docSnap.id}')">On Route</button>` : ""}
            ${j.status === "on_route" && j.takenBy === username ? `<button class="jobBtn secondary" onclick="markCompleted('${docSnap.id}')">Complete</button>` : ""}
          </div>
        </div>
      `;
    });

    document.getElementById("jobs").innerHTML = html;
  });
}

// DRIVERS + TYPING
function loadDrivers() {
  onSnapshot(collection(db, "presence"), (snapshot) => {
    const driversEl = document.getElementById("drivers");
    const typingEl = document.getElementById("typing");
    driversEl.innerHTML = "";

    let typingNames = [];

    snapshot.forEach((docSnap) => {
      const p = docSnap.data();
      const isMe = p.name === username;

      const card = document.createElement("div");
      card.className = "driverCard";
      card.onclick = () => openProfile(p.name);

      const avatar = document.createElement("div");
      avatar.className = "driverAvatar";
      avatar.innerText = p.name?.charAt(0)?.toUpperCase() || "?";

      const info = document.createElement("div");
      info.className = "driverInfo";

      const name = document.createElement("div");
      name.className = "driverName";
      name.innerText = p.name + (isMe ? " (You)" : "");

      const status = document.createElement("div");
      status.className = "driverStatus";
      status.innerText = p.online ? "Online" : "Offline";

      info.appendChild(name);
      info.appendChild(status);

      card.appendChild(avatar);
      card.appendChild(info);
      driversEl.appendChild(card);

      if (p.typing && !isMe) {
        typingNames.push(p.name);
      }
    });

    if (typingNames.length > 0) {
      typingEl.classList.remove("hidden");
      typingEl.innerText =
        typingNames.length === 1
          ? `${typingNames[0]} is typing...`
          : `${typingNames.join(", ")} are typing...`;
    } else {
      typingEl.classList.add("hidden");
      typingEl.innerText = "";
    }
  });
}

// PROFILE MODAL
window.openProfile = function (name) {
  const modal = document.getElementById("profileModal");
  const avatar = document.getElementById("profileAvatar");
  const pname = document.getElementById("profileName");
  const meta = document.getElementById("profileMeta");

  avatar.innerText = name.charAt(0).toUpperCase();
  pname.innerText = name;
  meta.innerText = "Driver in the network • Real-time presence enabled";

  modal.style.display = "flex";
};

window.closeProfile = function () {
  document.getElementById("profileModal").style.display = "none";
};

// TABS
window.showTab = function (tab, el) {
  document.getElementById("chat").classList.toggle("hidden", tab !== "chat");
  document.getElementById("jobsTab").classList.toggle("hidden", tab !== "jobs");
  document.getElementById("driversTab").classList.toggle("hidden", tab !== "drivers");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("activeTab"));
  if (el) el.classList.add("activeTab");
};

// STATUS
function updateStatusUI() {
  document.getElementById("status").innerHTML =
    isOnline
      ? '<span class="statusDot online"></span>Online'
      : '<span class="statusDot offline"></span>Offline';
}

setInterval(updateStatusUI, 5000);
</script>
</body>
</html>
