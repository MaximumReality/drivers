<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>Driver Network</title>
<style>
  body {
    margin: 0;
    font-family: system-ui, -apple-system, Arial;
    background: #0f1419;
    color: #fff;
  }

  /* HEADER BAR */
  .header {
    background: #128C7E;
    padding: 14px;
    font-size: 18px;
    font-weight: bold;
  }

  /* LOGIN SCREEN */
  #login {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0f1419;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 20px;
  z-index: 9999;
}

  
html, body {
  height: 100%;
  margin: 0;
  overflow: hidden; /* 🔒 locks outer page scrolling */
  touch-action: manipulation;
}
  #chat, #jobsTab {
  height: calc(100vh - 140px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
  
  #login input {
    padding: 14px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
  }

  #login button {
    margin-top: 10px;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: #128C7E;
    color: white;
    font-size: 16px;
  }

  /* APP LAYOUT */
  .hidden { display: none; }

  .tabs {
    display: flex;
    background: #1f2c34;
  }

  .tab {
    flex: 1;
    text-align: center;
    padding: 12px;
    cursor: pointer;
    color: #aaa;
  }

  .activeTab {
    color: #25D366;
    border-bottom: 2px solid #25D366;
  }

  /* CHAT + JOBS */
  #messages, #jobs {
    height: calc(100vh - 140px);
    overflow-y: auto;
    padding: 10px;
  }

  .msg {
    margin: 8px 0;
    padding: 8px 10px;
    background: #1f2c34;
    border-radius: 10px;
  }

  .msg b {
    color: #25D366;
  }

  .inputBar {
    display: flex;
    padding: 10px;
    background: #1f2c34;
  }

  .inputBar input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
  }

  .inputBar button {
    margin-left: 8px;
    background: #25D366;
    border: none;
    padding: 10px 14px;
    border-radius: 20px;
    color: #000;
    font-weight: bold;
  }

  .card {
    background: #1f2c34;
    padding: 12px;
    margin: 10px;
    border-radius: 12px;
  }

  .card button {
    margin-top: 8px;
    background: #25D366;
    border: none;
    padding: 8px 12px;
    border-radius: 10px;
  }
 
.jobCard {
  background: #1f2c34;
  margin: 10px;
  padding: 14px;
  border-radius: 14px;
  transition: 0.15s ease;
  border-left: 4px solid #25D366;
}

.jobCard:active {
  transform: scale(0.98);
}

.jobRoute {
  font-size: 16px;
  font-weight: bold;
}

.jobMeta {
  font-size: 13px;
  opacity: 0.7;
  margin-top: 4px;
}

.jobStatus {
  margin-top: 6px;
  font-size: 13px;
}

.jobHint {
  margin-top: 8px;
  font-size: 11px;
  opacity: 0.5;
}

/* ONLINE / OFFLINE INDICATOR */
.statusDot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
}

.online {
  background: #25D366;
}

.offline {
  background: #ff4d4d;
}

  .avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #25D366;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-right: 8px;
  font-weight: bold;
  color: #000;
}
</style>

</head>
<body>

  
<!-- LOGIN -->
<div id="login">
  <h2 style="color:#25D366;">DriverLink</h2>
  <p style="opacity:0.7;">Enter your name to continue</p>
  <input id="name" placeholder="Your name">
  <button onclick="login()">Enter Network</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="header">
  <span id="avatar" class="avatar"></span>
  DriverLink <span id="status"></span>
</div>

  <div class="tab activeTab" onclick="showTab('chat', this)">Chat</div>
<div class="tab" onclick="showTab('jobs', this)">Jobs</div>

  <!-- CHAT -->
  <div id="chat">
    <div id="messages"></div>

    <div class="inputBar">
      <input id="msgInput" placeholder="Message drivers...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- JOBS -->
  <div id="jobsTab" class="hidden">
    <button onclick="postJob()" style="margin:10px; padding:10px; border:none; border-radius:10px; background:#25D366;">
  + Post Job
</button>

    <div id="jobs"></div>
  </div>

</div>

</div>

<!-- FIREBASE (MODERN MODULAR VERSION) -->

<script type="module"> console.log("DriverLink script loaded");

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  import {

    getFirestore,

    collection,

    addDoc,

    onSnapshot,

    query,

    orderBy,

    updateDoc,

    doc

  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  import {

    getAuth,

    signInAnonymously

  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // 🔑 YOUR FIREBASE CONFIG (KEEP YOURS)

  const firebaseConfig = {

    apiKey: "AIzaSyDhvNqHgKH5auAOCPUm4wZITa_3N5Ctnvc",

    authDomain: "driverlink-app.firebaseapp.com",

    projectId: "driverlink-app",

    storageBucket: "driverlink-app.firebasestorage.app",

    messagingSenderId: "360444468582",

    appId: "1:360444468582:web:0af78a95d0dfe104e9fca7"

  };

  // INIT

  const app = initializeApp(firebaseConfig);

  const db = getFirestore(app);

  const auth = getAuth(app);

  // 🔓 Anonymous login

  await signInAnonymously(auth);

  // 👤 TEMP USERNAME (since login screen still exists)

  let username = "";

window.login = function () {
  const input = document.getElementById("name");
  username = input.value.trim();

  if (!username) {
    alert("Enter a name");
    return;
  }

  document.getElementById("avatar").innerText =
    username.charAt(0).toUpperCase();

  document.getElementById("login").style.display = "none";
  document.getElementById("app").classList.remove("hidden");

  loadMessages();
  loadJobs();
  updateStatusUI();
};

 

  

  // 💬 SEND MESSAGE

  window.sendMessage = async function () {

    const text = document.getElementById("msgInput").value;

    await addDoc(collection(db, "messages"), {

      name: username || "Driver",

      text: text,

      time: Date.now()

    });

    document.getElementById("msgInput").value = "";

  };

  // 📡 LOAD MESSAGES

  function loadMessages() {

    const q = query(collection(db, "messages"), orderBy("time"));

    onSnapshot(q, (snapshot) => {

      let html = "";

      snapshot.forEach((docSnap) => {

        const m = docSnap.data();

        html += `<div><b>${m.name}:</b> ${m.text}</div>`;

      });

      document.getElementById("messages").innerHTML = html;

    });

  }

  // 🚗 POST JOB

  window.postJob = async function () {

    let from = prompt("From:");

    let to = prompt("To:");

    let time = prompt("Time:");

    await addDoc(collection(db, "jobs"), {

      from,

      to,

      time,

      postedBy: username || "Driver",

      takenBy: null

    });

  };

  // ✋ TAKE JOB

  window.takeJob = async function (id) {
  await updateDoc(doc(db, "jobs", id), {
    takenBy: username
  });
};



  // 📡 LOAD JOBS

  function loadJobs() {
  onSnapshot(collection(db, "jobs"), (snapshot) => {
    let html = "";

    snapshot.forEach((docSnap) => {
      let j = docSnap.data();

      const status = j.takenBy
        ? `🔴 Taken by ${j.takenBy}`
        : `🟢 Available`;

      const time = j.time ? `🕒 ${j.time}` : "";

      html += `
        <div class="jobCard" onclick="takeJob('${docSnap.id}')">
          <div class="jobRoute">
            🚗 ${j.from} → ${j.to}
          </div>

          <div class="jobMeta">
            ${time}
          </div>

          <div class="jobStatus">
            ${status}
          </div>

          <div class="jobHint">
            Tap to claim
          </div>
        </div>
      `;
    });

    document.getElementById("jobs").innerHTML = html;
  });
}
  window.showTab = function(tab, el) {
  document.getElementById("chat").classList.toggle("hidden", tab !== "chat");
  document.getElementById("jobsTab").classList.toggle("hidden", tab !== "jobs");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("activeTab"));

  if (el) el.classList.add("activeTab");
};

let isOnline = true;

function updateStatusUI() {
  document.getElementById("status").innerHTML =
    isOnline
      ? '<span class="statusDot online"></span>Online'
      : '<span class="statusDot offline"></span>Offline';
}

setInterval(updateStatusUI, 2000);

</script>

</body>
</html>
