<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Network</title>
  <style>
    body { font-family: Arial; margin:0; background:#111; color:#fff; }
    .hidden { display:none; }
    .tab { padding:10px; display:inline-block; cursor:pointer; }
    .active { background:#333; }
    #messages, #jobs { height:60vh; overflow:auto; padding:10px; }
    input, button { padding:10px; margin:5px; }
    .card { background:#222; padding:10px; margin:5px 0; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h2>Enter Name</h2>
  <input id="name" placeholder="Your name">
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <!-- Tabs -->
  <div>
    <span class="tab active" onclick="showTab('chat')">Chat</span>
    <span class="tab" onclick="showTab('jobs')">Jobs</span>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div id="messages"></div>
    <input id="msgInput" placeholder="Message">
    <button onclick="sendMessage()">Send</button>
  </div>

  <!-- JOBS -->
  <div id="jobsTab" class="hidden">
    <button onclick="postJob()">Post Job</button>
    <div id="jobs"></div>
  </div>

</div>

<!-- FIREBASE (MODERN MODULAR VERSION) -->

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  import {

    getFirestore,

    collection,

    addDoc,

    onSnapshot,

    query,

    orderBy,

    updateDoc,

    doc

  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  import {

    getAuth,

    signInAnonymously

  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // 🔑 YOUR FIREBASE CONFIG (KEEP YOURS)

  const firebaseConfig = {

    apiKey: "AIzaSyDhvNqHgKH5auAOCPUm4wZITa_3N5Ctnvc",

    authDomain: "driverlink-app.firebaseapp.com",

    projectId: "driverlink-app",

    storageBucket: "driverlink-app.firebasestorage.app",

    messagingSenderId: "360444468582",

    appId: "1:360444468582:web:0af78a95d0dfe104e9fca7"

  };

  // INIT

  const app = initializeApp(firebaseConfig);

  const db = getFirestore(app);

  const auth = getAuth(app);

  // 🔓 Anonymous login

  await signInAnonymously(auth);

  // 👤 TEMP USERNAME (since login screen still exists)

  let username = "";

  // Make functions global so your HTML buttons still work

  window.login = function () {

    username = document.getElementById("name").value;

    document.getElementById("login").classList.add("hidden");

    document.getElementById("app").classList.remove("hidden");

    loadMessages();

    loadJobs();

  };

  window.showTab = function (tab) {

    document.getElementById("chat").classList.toggle("hidden", tab !== "chat");

    document.getElementById("jobsTab").classList.toggle("hidden", tab !== "jobs");

  };

  // 💬 SEND MESSAGE

  window.sendMessage = async function () {

    const text = document.getElementById("msgInput").value;

    await addDoc(collection(db, "messages"), {

      name: username || "Driver",

      text: text,

      time: Date.now()

    });

    document.getElementById("msgInput").value = "";

  };

  // 📡 LOAD MESSAGES

  function loadMessages() {

    const q = query(collection(db, "messages"), orderBy("time"));

    onSnapshot(q, (snapshot) => {

      let html = "";

      snapshot.forEach((docSnap) => {

        const m = docSnap.data();

        html += `<div><b>${m.name}:</b> ${m.text}</div>`;

      });

      document.getElementById("messages").innerHTML = html;

    });

  }

  // 🚗 POST JOB

  window.postJob = async function () {

    let from = prompt("From:");

    let to = prompt("To:");

    let time = prompt("Time:");

    await addDoc(collection(db, "jobs"), {

      from,

      to,

      time,

      postedBy: username || "Driver",

      takenBy: null

    });

  };

  // ✋ TAKE JOB

  window.takeJob = async function (id) {

    await updateDoc(doc(db, "jobs", id), {

      takenBy: username

    });

  };

  // 📡 LOAD JOBS

  function loadJobs() {

    onSnapshot(collection(db, "jobs"), (snapshot) => {

      let html = "";

      snapshot.forEach((docSnap) => {

        let j = docSnap.data();

        html += `

          <div class="card">

            <b>${j.from} → ${j.to}</b><br>

            ${j.time}<br>

            ${

              j.takenBy

                ? "Taken by " + j.takenBy

                : `<button onclick="takeJob('${docSnap.id}')">TAKE</button>`

            }

          </div>

        `;

      });

      document.getElementById("jobs").innerHTML = html;

    });

  }

</script>

</body>
</html>
