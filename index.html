<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DriverLink</title>
  <link rel="icon" href="favicon.png">


<style>
  :root {
    --bg: #ECE5DD;
    --panel: #FFFFFF;
    --panel-light: #F7F7F7;
    --accent: #25D366;
    --accent-dark: #128C7E;
    --text: #111;
    --text-dim: #555;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, Arial;
    overflow-x: hidden;
    box-sizing: border-box;
  }

  * {
    box-sizing: inherit;
  }

  .hidden { display: none; }

  /* HEADER */
  .header {
    background: var(--accent-dark);
    padding: 14px;
    font-size: 18px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: space-between;
    white-space: nowrap;
    overflow: hidden;
    color: white;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 30;
  }

  .header img {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    margin-right: 10px;
  }

  #status {
    flex-shrink: 1;
    max-width: 80px;
    text-overflow: ellipsis;
    overflow: hidden;
    font-size: 14px;
  }

  .statusDot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }

  .online { background: var(--accent); }
  .offline { background: #ff4d4d; }

  /* LOGIN */
  #login {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 30px;
    z-index: 9999;
    text-align: center;
  }

  #login img {
    width: 80px;
    height: 80px;
    border-radius: 14px;
    margin: 0 auto 20px;
  }

  #login input {
    padding: 14px;
    margin-top: 12px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    width: 100%;
  }

  #login button {
    margin-top: 12px;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--accent-dark);
    color: white;
    font-size: 16px;
    width: 100%;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--panel);
    position: fixed;
    top: 58px;
    width: 100%;
    z-index: 25;
  }

  .tab {
    flex: 1;
    text-align: center;
    padding: 12px;
    cursor: pointer;
    color: var(--text-dim);
    font-weight: 500;
  }

  .activeTab {
    color: var(--accent-dark);
    border-bottom: 2px solid var(--accent-dark);
  }

  /* PANELS */
  #chat, #jobsTab, #driversTab {
    position: absolute;
    top: 110px;
    bottom: 60px;
    left: 0;
    right: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px;
    background: url('wallpaper.PNG');
    background-size: 280px;
    background-repeat: repeat;
  }

  /* CHAT */
  #messages {
    padding-bottom: 8px;
  }

  .bubble {
    max-width: 80%;
    padding: 8px 12px;
    border-radius: 14px;
    margin-bottom: 8px;
    line-height: 1.4;
    font-size: 15px;
    position: relative;
    display: inline-block;
  }

  .bubble.me {
    background: var(--accent);
    color: #000;
    margin-left: auto;
    border-bottom-right-radius: 4px;
    display: block;
  }

  .bubble.them {
    background: var(--panel);
    border-bottom-left-radius: 4px;
    display: block;
  }

  .bubble .name {
    font-weight: bold;
    color: var(--accent-dark);
    margin-bottom: 2px;
    font-size: 13px;
  }

  .bubble .meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    text-align: right;
  }

  .typingIndicator {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    font-style: italic;
  }

  /* INPUT BAR */
  .inputBar {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: var(--panel);
    padding: 10px;
    display: flex;
    align-items: center;
    z-index: 30;
  }

  .attachBtn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--panel-light);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 8px;
    font-size: 20px;
    cursor: pointer;
  }

  .inputBar input {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    border: none;
    font-size: 15px;
  }

  .inputBar button {
    margin-left: 10px;
    background: var(--accent-dark);
    border: none;
    padding: 10px 16px;
    border-radius: 20px;
    color: white;
    font-weight: bold;
  }

  /* JOBS */
  .jobCard {
    background: var(--panel);
    margin: 10px 0;
    padding: 14px;
    border-radius: 14px;
    border-left: 4px solid var(--accent-dark);
    transition: 0.15s ease;
  }

  .jobCard:active {
    transform: scale(0.97);
  }

  .jobRoute {
    font-size: 17px;
    font-weight: bold;
  }

  .jobMeta {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 4px;
  }

  .jobStatus {
    margin-top: 6px;
    font-size: 13px;
  }

  .jobHint {
    margin-top: 8px;
    font-size: 11px;
    opacity: 0.5;
  }

  .jobActions {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .jobBtn {
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }

  .jobBtn.primary {
    background: var(--accent);
    color: #000;
  }

  .jobBtn.secondary {
    background: var(--panel-light);
    color: var(--text);
  }

  .postJobBtn {
    margin: 10px 0;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--accent-dark);
    color: white;
    font-weight: bold;
    width: 100%;
  }

  /* DRIVERS */
  .driverCard {
    background: var(--panel);
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    cursor: pointer;
  }

  .driverAvatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--accent);
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 10px;
    font-weight: bold;
    font-size: 14px;
  }

  .driverInfo {
    flex: 1;
  }

  .driverName {
    font-size: 15px;
    font-weight: 500;
  }

  .driverStatus {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* PROFILE MODAL */
  #profileModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .profileCard {
    background: var(--panel);
    padding: 20px;
    border-radius: 14px;
    width: 80%;
    max-width: 320px;
    text-align: center;
  }

  .profileAvatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--accent);
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 10px;
    font-size: 26px;
    font-weight: bold;
  }

  .profileName {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .profileMeta {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .profileClose {
    margin-top: 10px;
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    background: var(--accent-dark);
    color: white;
    font-weight: 500;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <img src="icon.PNG">
  <h2 style="color:#128C7E;">DriverLink</h2>
  <p style="opacity:0.7;">Enter your name to continue</p>
  <input id="name" placeholder="Your name">
  <button onclick="login()">Enter Network</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="header">
    <div style="display:flex;align-items:center;">
      <img src="icon.PNG">
      <span>DriverLink</span>
    </div>
    <span id="status"></span>
  </div>

  <div class="tabs">
    <div class="tab activeTab" onclick="showTab('chat', this)">Chat</div>
    <div class="tab" onclick="showTab('jobs', this)">Jobs</div>
    <div class="tab" onclick="showTab('drivers', this)">Drivers</div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div id="messages"></div>
    <div id="typing" class="typingIndicator hidden"></div>
  </div>

  <!-- JOBS -->
  <div id="jobsTab" class="hidden">
    <button class="postJobBtn" onclick="postJob()">+ Post Job</button>
    <div id="jobs"></div>
  </div>

  <!-- DRIVERS -->
  <div id="driversTab" class="hidden">
    <div id="drivers"></div>
  </div>

  <!-- INPUT BAR -->
  <div class="inputBar">
    <div class="attachBtn" onclick="attachPhoto()">📸</div>
    <input id="msgInput" placeholder="Message drivers..." oninput="onTyping()">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- PROFILE MODAL -->
<div id="profileModal">
  <div class="profileCard">
    <div class="profileAvatar" id="profileAvatar"></div>
    <div class="profileName" id="profileName"></div>
    <div class="profileMeta" id="profileMeta"></div>
    <button class="profileClose" onclick="closeProfile()">Close</button>
  </div>
</div>

<script type="module">
  // Firebase v9+ modular imports from CDN
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    serverTimestamp,
    query,
    orderBy,
    doc,
    setDoc,
    updateDoc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import {
    getStorage,
    ref,
    uploadBytes,
    getDownloadURL
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  // Your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyDhvNqHgKH5auAOCPUm4wZITa_3N5Ctnvc",
    authDomain: "driverlink-app.firebaseapp.com",
    projectId: "driverlink-app",
    storageBucket: "driverlink-app.firebasestorage.app",
    messagingSenderId: "360444468582",
    appId: "1:360444468582:web:0af78a95d0dfe104e9fca7",
    measurementId: "G-MW6956PD0W"
  };

  // Init Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // Collections
  const messagesRef = collection(db, "messages");
  const jobsRef = collection(db, "jobs");
  const driversRef = collection(db, "drivers");
  const presenceRef = collection(db, "presence");
  const typingRef = collection(db, "typing");

  // Local state
  let currentUserId = null;
  let currentUserName = null;
  let typingTimeoutLocal = null;

  // STATUS
  function setStatus(isOnline) {
    const status = document.getElementById('status');
    status.innerHTML = `<span class="statusDot ${isOnline ? 'online' : 'offline'}"></span>${isOnline ? 'Online' : 'Offline'}`;
  }

  // LOGIN
  async function login() {
    const nameInput = document.getElementById('name');
    const name = nameInput.value.trim();
    if (!name) return;

    currentUserName = name;
    currentUserId = crypto.randomUUID();

    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    setStatus(true);

    // Create / update driver profile
    await setDoc(doc(driversRef, currentUserId), {
      name: currentUserName,
      online: true,
      lastSeen: serverTimestamp()
    }, { merge: true });

    // Presence
    await setDoc(doc(presenceRef, currentUserId), {
      online: true,
      lastSeen: serverTimestamp()
    }, { merge: true });

    // Listen to data
    startMessageListener();
    startJobsListener();
    startDriversListener();
    startTypingListener();

    // Handle offline
    window.addEventListener('beforeunload', async () => {
      try {
        await updateDoc(doc(presenceRef, currentUserId), {
          online: false,
          lastSeen: serverTimestamp()
        });
        await updateDoc(doc(driversRef, currentUserId), {
          online: false,
          lastSeen: serverTimestamp()
        });
      } catch (e) {
        // ignore
      }
    });
  }

  // TABS
  function showTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('activeTab'));
    el.classList.add('activeTab');

    document.getElementById('chat').classList.add('hidden');
    document.getElementById('jobsTab').classList.add('hidden');
    document.getElementById('driversTab').classList.add('hidden');

    if (tab === 'chat') document.getElementById('chat').classList.remove('hidden');
    if (tab === 'jobs') document.getElementById('jobsTab').classList.remove('hidden');
    if (tab === 'drivers') document.getElementById('driversTab').classList.remove('hidden');
  }

  // REAL-TIME MESSAGES
  function startMessageListener() {
    const q = query(messagesRef, orderBy('timestamp', 'asc'));
    onSnapshot(q, (snapshot) => {
      const msgArea = document.getElementById('messages');
      msgArea.innerHTML = '';
      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        const bubble = document.createElement('div');
        const isMe = data.senderId === currentUserId;
        bubble.className = 'bubble ' + (isMe ? 'me' : 'them');

        let content = '';
        if (data.type === 'photo' && data.photoURL) {
          content = `<img src="${data.photoURL}" style="max-width:100%;border-radius:10px;margin-top:4px;">`;
        } else {
          content = data.text || '';
        }

        bubble.innerHTML = `
          <div class="name">${data.senderName || 'Driver'}</div>
          <div>${content}</div>
          <div class="meta">${data.timestamp?.toDate ? data.timestamp.toDate().toLocaleTimeString() : ''}</div>
        `;
        msgArea.appendChild(bubble);
      });
      msgArea.scrollTop = msgArea.scrollHeight;
    });
  }

  // SEND MESSAGE
  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || !currentUserId) return;

    await addDoc(messagesRef, {
      text,
      senderId: currentUserId,
      senderName: currentUserName || 'Driver',
      type: 'text',
      timestamp: serverTimestamp()
    });

    input.value = '';
    await setDoc(doc(typingRef, currentUserId), { typing: false }, { merge: true });
  }

  // TYPING
  async function onTyping() {
    if (!currentUserId) return;
    const typingEl = document.getElementById('typing');

    await setDoc(doc(typingRef, currentUserId), { typing: true }, { merge: true });

    clearTimeout(typingTimeoutLocal);
    typingTimeoutLocal = setTimeout(async () => {
      await setDoc(doc(typingRef, currentUserId), { typing: false }, { merge: true });
    }, 800);

    typingEl.classList.remove('hidden');
    typingEl.innerText = "You are typing…";
  }

  function startTypingListener() {
    onSnapshot(typingRef, (snapshot) => {
      const typingEl = document.getElementById('typing');
      let someoneTyping = false;
      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        if (data.typing && docSnap.id !== currentUserId) {
          someoneTyping = true;
        }
      });
      if (someoneTyping) {
        typingEl.classList.remove('hidden');
        typingEl.innerText = "Someone is typing…";
      } else {
        typingEl.classList.add('hidden');
      }
    });
  }

  // CAMERA ATTACH + UPLOAD
  async function attachPhoto() {
    if (!currentUserId) return;

    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.capture = 'environment';

    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const storageRef = ref(storage, `photos/${currentUserId}/${Date.now()}_${file.name}`);
      await uploadBytes(storageRef, file);
      const url = await getDownloadURL(storageRef);

      await addDoc(messagesRef, {
        text: '',
        senderId: currentUserId,
        senderName: currentUserName || 'Driver',
        type: 'photo',
        photoURL: url,
        timestamp: serverTimestamp()
      });
    };

    input.click();
  }

  // JOBS
  function startJobsListener() {
    const q = query(jobsRef, orderBy('timestamp', 'desc'));
    onSnapshot(q, (snapshot) => {
      const jobsEl = document.getElementById('jobs');
      jobsEl.innerHTML = '';
      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        const card = document.createElement('div');
        card.className = 'jobCard';

        const statusText = data.status || 'open';
        const claimedBy = data.claimedBy ? `Claimed by ${data.claimedByName || 'driver'}` : 'Not claimed yet';

        card.innerHTML = `
          <div class="jobRoute">${data.route || 'Job'}</div>
          <div class="jobMeta">${data.postedBy || 'Dispatcher'}</div>
          <div class="jobStatus">Status: ${statusText}</div>
          <div class="jobHint">${claimedBy}</div>
          <div class="jobActions">
            ${statusText === 'open' ? '<button class="jobBtn primary">Claim</button>' : ''}
          </div>
        `;

        if (statusText === 'open') {
          const btn = card.querySelector('.jobBtn.primary');
          btn.onclick = async () => {
            await updateDoc(doc(jobsRef, docSnap.id), {
              status: 'claimed',
              claimedBy: currentUserId,
              claimedByName: currentUserName || 'Driver'
            });
          };
        }

        jobsEl.appendChild(card);
      });
    });
  }

  async function postJob() {
    if (!currentUserId) return;
    const route = prompt("Job route / description:");
    if (!route) return;

    await addDoc(jobsRef, {
      route,
      postedBy: currentUserName || 'Dispatcher',
      status: 'open',
      timestamp: serverTimestamp()
    });
  }

  // DRIVERS
  function startDriversListener() {
    onSnapshot(driversRef, (snapshot) => {
      const driversEl = document.getElementById('drivers');
      driversEl.innerHTML = '';
      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        const card = document.createElement('div');
        card.className = 'driverCard';

        const avatar = document.createElement('div');
        avatar.className = 'driverAvatar';
        avatar.innerText = (data.name || 'D')[0].toUpperCase();

        const info = document.createElement('div');
        info.className = 'driverInfo';

        const nameEl = document.createElement('div');
        nameEl.className = 'driverName';
        nameEl.innerText = data.name || 'Driver';

        const statusEl = document.createElement('div');
        statusEl.className = 'driverStatus';
        statusEl.innerText = data.online ? 'Online' : 'Offline';

        info.appendChild(nameEl);
        info.appendChild(statusEl);

        card.appendChild(avatar);
        card.appendChild(info);

        card.onclick = () => openProfile(docSnap.id, data);

        driversEl.appendChild(card);
      });
    });
  }

  function openProfile(id, data) {
    document.getElementById('profileAvatar').innerText = (data.name || 'D')[0].toUpperCase();
    document.getElementById('profileName').innerText = data.name || 'Driver';
    document.getElementById('profileMeta').innerText = data.online ? 'Online' : 'Offline';
    document.getElementById('profileModal').style.display = 'flex';
  }

  function closeProfile() {
    document.getElementById('profileModal').style.display = 'none';
  }

  // Expose functions for inline handlers
  window.login = login;
  window.showTab = showTab;
  window.sendMessage = sendMessage;
  window.onTyping = onTyping;
  window.attachPhoto = attachPhoto;
  window.postJob = postJob;
  window.closeProfile = closeProfile;
</script>

</body>
</html>
